<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Checkout - Sip & Energize</title>
</head>

<body>
    <header>
        <div class="header">
            <img src="images/cup(1).png" width="50" alt="Sip & Energize logo cup icon">
            <h1>Sip & Energize</h1>
        </div>
    </header>
    <h3>Complete Your Order</h3>

    <section id="checkout-cart-summary" class="checkout-summary" aria-label="Order summary">
        <!-- Cart summary will be rendered here -->
        <ol id="summary-list"></ol>
        <p id="summary-total"></p>

    </section>

    <form class="modal" id="checkout-form" type="button" aria-label="Checkout form">

        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" name="fullName" required>

        <label for="phone">Phone Number</label>
        <input id="phone" type="tel" name="phone" required>

        <label for="address">Address</label>
        <input id="address" type="text" name="address" required>

        <button type="submit" class="add-to-cart">Confirm Order</button>
    </form>

    <script src="script.js"></script>
</body>

</html>
