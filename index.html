<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Sip & Energize</title>
</head>

<body>
    <header>
        <div class="header">
            <img src="images/cup(1).png" width="50" alt="Sip & Energize logo cup icon">
            <h1>Sip & Energize</h1>
            <button id="cart-toggle" class="icon-button" type="button" aria-label="Toggle shopping cart">
                <img src="images/shopping-bag(1).png" class="cart-icon" width="45" alt="Shopping cart icon">
                <span id="cart-count" aria-live="polite">0</span>
            </button>
        </div>
    </header>

    <main>
        <section id="cart-panel" class="cart" aria-label="Shopping cart">
            <div id="cart-items">
                <p>No items yet</p>
            </div>

            <p>Subtotal: <span id="subtotal">0</span> EGP</p>

            <a href="checkout.html">
                <button class="add-to-cart" type="button">Checkout</button>
            </a>
        </section>

        <section class="content">
            <article class="product-card">
                <img src="images/pipore2.jpeg" alt="Pipore Yerba Mate 250G package" width="180" height="200">
                <p class="product-title">Pipore Yerba Mate 250G</p>
                <p class="product-price">150 EGP</p>
                <button class="add-to-cart js-add-to-cart" type="button" data-product="Pipore 250G">Add to Cart</button>
            </article>

            <article class="product-card">
                <img src="images/images.jpeg" alt="Sara Yerba Mate 1KG package" width="200" height="200">
                <p class="product-title">Sara Yerba Mate 1KG</p>
                <p class="product-price">300 EGP</p>
                <button class="add-to-cart js-add-to-cart" type="button" data-product="Sara 1KG">Add to Cart</button>
            </article>

            <article class="product-card">
                <img src="images/1.jpeg" alt="Royale Yerba Mate 500G package" width="200" height="200">
                <p class="product-title">Royale Yerba Mate 500G</p>
                <p class="product-price">200 EGP</p>
                <button class="add-to-cart js-add-to-cart" type="button" data-product="Royale 500G">Add to Cart</button>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
